id: org.sensadapt.SensAdapt
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: sensadapt

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=session-bus
  - --talk-name=org.sensadapt.Switcher
  - --talk-name=org.kde.KWin
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=~/.config:create
  - --filesystem=~/.local/share/kwin/scripts:create
  - --filesystem=~/.local/bin:create
  - --filesystem=~/.config/systemd/user:create
  - --filesystem=~/.local/share/applications:create
  - --filesystem=~/.config/autostart:create
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: python3-dbus
    buildsystem: autotools
    config-opts:
      - --with-python=/usr/bin/python3
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/d/dbus-python/dbus-python-1.4.0.tar.gz
        sha256: 991666e498f60dbf3e49b8b7678f5559b8a65034fdf61aae62cdecdb7d89c770
        x-checker-data:
          type: anitya
          project-id: 4372
          url-template: https://files.pythonhosted.org/packages/source/d/dbus-python/dbus-python-$version.tar.gz

  - name: sensadapt
    buildsystem: simple
    build-commands:
      - install -Dm755 sensadapt /app/bin/sensadapt
      - install -Dm755 sensadapt-daemon /app/bin/sensadapt-daemon
      - install -Dm644 flatpak/org.sensadapt.SensAdapt.desktop /app/share/applications/org.sensadapt.SensAdapt.desktop
      - install -Dm644 flatpak/org.sensadapt.SensAdapt.metainfo.xml /app/share/metainfo/org.sensadapt.SensAdapt.metainfo.xml
      - install -Dm644 flatpak/org.sensadapt.SensAdapt.svg /app/share/icons/hicolor/scalable/apps/org.sensadapt.SensAdapt.svg
    sources:
      - type: git
        url: https://github.com/A2nasB/SensAdapt.git
        tag: main
